<template>
    <lightning-card title="Galería de Fotos Interactiva" icon-name="custom:custom38">
        <div class="slds-p-around_medium slds-text-align_center">
            
            <div class="slds-m-bottom_medium">
                <span class="slds-badge slds-theme_brand">
                    Interacciones totales: {contador}
                </span>
            </div>

            <div class="slds-m-vertical_large slds-align_absolute-center slds-grid slds-grid_vertical">
                <lightning-icon 
                    icon-name={currentImage.iconName} 
                    size="large">
                </lightning-icon>
                <h3 class="slds-text-heading_small slds-m-top_medium">{currentImage.titulo}</h3>
            </div>

            <div class="slds-m-top_medium">
                <lightning-button 
                    label="Anterior" 
                    icon-name="utility:chevronleft" 
                    onclick={handlePrevious}
                    class="slds-m-horizontal_small">
                </lightning-button>

                <lightning-button 
                    label="Siguiente" 
                    icon-name="utility:chevronright" 
                    icon-position="right"
                    onclick={handleNext}
                    variant="brand"
                    class="slds-m-horizontal_small">
                </lightning-button>
            </div>

        </div>
    </lightning-card>
</template>
