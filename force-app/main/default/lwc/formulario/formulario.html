<template>
    <lightning-card title="Formulario de Contacto" icon-name="standard:contact">
        <div class="slds-p-around_medium">
            
            <lightning-input 
                label="Nombre" 
                data-id="nombre"
                required
                onchange={handleInputChange}
                onblur={handleBlur}>
            </lightning-input>

            <lightning-input 
                label="Email" 
                type="email"
                data-id="email"
                required
                onchange={handleInputChange}
                onblur={handleBlur}>
            </lightning-input>

            <lightning-textarea 
                label="Mensaje" 
                data-id="mensaje"
                required
                onchange={handleInputChange}
                onblur={handleBlur}>
            </lightning-textarea>

            <div class="slds-m-top_medium">
                <lightning-button 
                    label="Enviar Formulario" 
                    variant="brand" 
                    onclick={handleSubmit}>
                </lightning-button>
            </div>
            
        </div>
    </lightning-card>
</template>
